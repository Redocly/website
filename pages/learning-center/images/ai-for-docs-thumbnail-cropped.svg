<svg xmlns="http://www.w3.org/2000/svg" width="378" height="112" viewBox="0 0 378 112">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M 14 0 L 0 0 0 14" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="378" height="112" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="378" height="112" rx="12" fill="url(#grid)" opacity="0.06"/>

  <circle cx="70" cy="18" r="44" fill="url(#accent)" opacity="0.28" filter="url(#softGlow)"/>
  <circle cx="322" cy="96" r="48" fill="url(#accent)" opacity="0.22" filter="url(#softGlow)"/>
  <circle cx="304" cy="22" r="28" fill="url(#accent)" opacity="0.18" filter="url(#softGlow)"/>

  <g transform="translate(24, 22)">
    <rect rx="6" ry="6" width="92" height="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="46" y="12" text-anchor="middle" dominant-baseline="middle"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
          font-size="9" fill="#cbd5e1" letter-spacing="0.5">learning center</text>
  </g>

  <text x="24" y="72"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-weight="700"
        font-size="26"
        fill="#F8FAFC"
        letter-spacing="-0.4">AI for Docs</text>

  <text x="24" y="96"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="10"
        fill="#93C5FD"
        opacity="0.9">practical ways AI accelerates writing, editing, and review</text>

  <rect x="24" y="78" width="118" height="3" fill="url(#accent)" rx="1.5"/>
</svg>
