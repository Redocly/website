type: object
description: Catalog entity relation.
required:
  - id
  - organizationId
  - projectId
  - sourceId
  - sourceKey
  - targetId
  - targetKey
  - sourceToTargetRelation
  - targetToSourceRelation
  - object
  - createdAt
  - updatedAt
properties:
  id:
    type: string
    pattern: ^cer_[0-9abcdefghjkmnpqrstvwxyz]{26}$
    description: Entity relation ID in ULID format. Automatically generated by the Catalog.
    example: cer_01hh1t9sa6gwfv5naz04gr7ehm
    readOnly: true
  organizationId:
    type: string
    pattern: ^org_[0-9abcdefghjkmnpqrstvwxyz]{26}$
    description: Organization ID.
    example: org_01hh1t9sa6gwfv5naz04gr7ehm
    readOnly: true
  projectId:
    type: string
    pattern: ^prj_[0-9abcdefghjkmnpqrstvwxyz]{26}$
    description: Project ID.
    example: prj_01hh1t9sa6gwfv5naz04gr7ehm
    readOnly: true
  sourceId:
    type: string
    pattern: ^ce_[0-9abcdefghjkmnpqrstvwxyz]{26}$
    description: Identifier of the first entity.
    example: ce_01hh1t9sa6gwfv5naz04gr7ehm
  sourceKey:
    type: string
    description: Key of the first the entity.
    example: my-service-1
  targetId:
    type:
      - string
      - 'null'
    pattern: ^ce_[0-9abcdefghjkmnpqrstvwxyz]{26}$
    description: Identifier of the second entity.
    example: ce_01hh1t9sa6gwfv5naz04gr7ehm
  targetKey:
    type: string
    description: Key of the second the entity.
    example: my-service-1
  object:
    description: Entity name.
    type: string
    enum: [catalogEntityRelation]
    readOnly: true
  createdAt:
    type: string
    format: date-time
    description: Entity created date and time.
    example: '2023-01-01T12:00:00Z'
    readOnly: true
  updatedAt:
    type: string
    format: date-time
    description: Entity update date and time.
    example: '2023-01-01T12:00:00Z'
    readOnly: true
  sourceToTargetRelation:
    type: string
    description: Relation type from source to target.
    example: dependsOn
  targetToSourceRelation:
    type: string
    description: Relation type from target to source.
    example: dependencyOf
