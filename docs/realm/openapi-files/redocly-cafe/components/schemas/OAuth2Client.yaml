type: object
description: >
  OAuth2 client registration response. Per RFC 7591, includes the client
  identifier, 

  secret, timestamps, and all registered client metadata.
properties:
  clientId:
    type: string
    description: Client identifier issued by the authorization server.
  clientSecret:
    type: string
    description: Client secret issued by the authorization server.
  clientIdIssuedAt:
    type: integer
    format: int64
    description: >-
      Time when the client_id is issued, represented as seconds since epoch (RFC
      7591).
  clientSecretExpiresAt:
    type: integer
    format: int64
    description: >-
      Time at which the client_secret expires, represented as seconds since
      epoch. 0 indicates the secret does not expire (RFC 7591).
  name:
    type: string
    description: Client name (registered metadata).
  redirectUris:
    type: array
    items:
      type: string
      format: uri
    description: List of redirect URIs (registered metadata).
  scopes:
    type: array
    items:
      type: string
      enum:
        - menu:read
        - menu:write
        - orders:read
        - orders:write
    description: List of scopes (registered metadata).
  grantTypes:
    type: array
    items:
      type: string
      enum:
        - authorization_code
        - client_credentials
    description: List of grant types (registered metadata).
required:
  - clientId
  - clientSecret
  - clientIdIssuedAt
  - clientSecretExpiresAt
