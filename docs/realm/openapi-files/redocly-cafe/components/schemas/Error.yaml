type: object
properties:
  type:
    type: string
    format: uri-reference
    description: URI reference that identifies the problem type.
    default: about:blank
  title:
    type: string
    description: Short summary of the problem type.
  status:
    type: integer
    format: int32
    description: >-
      HTTP status code generated by the origin server for this occurrence of the
      problem.
    minimum: 100
    exclusiveMaximum: 600
  code:
    description: Error code.
    type: string
  message:
    description: Human-readable error message.
    type: string
  details:
    description: Additional error details.
    type: object
    additionalProperties: true
required:
  - type
  - title
  - status
  - code
  - message
